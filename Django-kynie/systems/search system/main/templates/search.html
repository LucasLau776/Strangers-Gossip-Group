{% extends 'main/base.html' %}

{% block content %}
<h1>Search Posts</h1>

<form method="GET" action="{% url 'search' %}">
    <input type="text" name="q" placeholder="Search..." required>
    <button type="submit">Search</button>
</form>

{% if results %}
    <ul>
        {% for post in results %}
            <li>{{ post.title }}</li>
        {% endfor %}
    </ul>
{% elif request.GET.q %}
    <p>No results found.</p>
{% endif %}
{% endblock %}
