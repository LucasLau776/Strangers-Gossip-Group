{% extends 'main/base.html' %}
{% load static %}

{% block title %}Search - MMU Strangers Gossip{% endblock %}

{% block content %}
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f4;
    color: #333;
    transition: background-color 0.3s, color 0.3s;
  }

  body.dark-mode {
    background-color: #121212;
    color: #f0f0f0;
  }

  /* Main Content */
  .container {
    padding: 100px 20px 40px;
    max-width: 800px;
    margin: auto;
  }

  h2 {
    text-align: center;
    margin-bottom: 30px;
  }

  .search-filter-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
    gap: 10px;
  }

  .search-filter-container input[type="text"] {
    padding: 12px;
    font-size: 1rem;
    border-radius: 5px;
    border: none;
    background-color: white;
    color: #000;
    flex: 1 1 60%;
    min-width: 200px;
  }

  body.dark-mode .search-filter-container input[type="text"] {
    background-color: #2c2c2c;
    color: #f0f0f0;
  }

  .search-filter-container select,
  .search-filter-container button {
    padding: 12px;
    font-size: 1rem;
    border-radius: 5px;
    border: none;
    background-color: #377FC6;
    color: white;
    cursor: pointer;
  }

  .search-filter-container select {
    background-color: #555;
    color: white;
  }

  body.dark-mode .search-filter-container select {
    background-color: #2c2c2c;
    color: #f0f0f0;
  }

  .search-filter-container button:hover {
    background-color: #2e6bb3;
  }

  .results {
    margin-top: 20px;
  }

  .result {
    background-color: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 5px;
    transition: background-color 0.3s;
  }

  body.dark-mode .result {
    background-color: #1e1e1e;
  }

  .result a {
    text-decoration: none;
    color: #333;
    font-weight: bold;
  }

  body.dark-mode .result a {
    color: #f0f0f0;
  }

  .result a:hover {
    text-decoration: underline;
  }

  p {
    text-align: center;
    font-style: italic;
  }
</style>

<div class="container">
  <h2>Search for Posts</h2>

  <!-- Combined Search and Filter Form -->
  <form method="get" action="{% url 'search' %}">
    <div class="search-filter-container">
      <input type="text" name="q" placeholder="Search for posts..." value="{{ request.GET.q }}">
      <select name="filter" id="filter">
        <option value="date" {% if request.GET.filter == 'date' %}selected{% endif %}>Date</option>
        <option value="year" {% if request.GET.filter == 'year' %}selected{% endif %}>Year</option>
        <option value="popularity" {% if request.GET.filter == 'popularity' %}selected{% endif %}>Popularity</option>
      </select>
      <button type="submit">Search</button>
    </div>
  </form>

  <!-- Search Results -->
  {% if results %}
  <div class="results">
    {% for post in results %}
    <div class="result">
      <a href="{% url 'full_post' post.id %}">{{ post.title }}</a>
    </div>
    {% endfor %}
  </div>
  {% elif request.GET.q %}
  <p>No results found.</p>
  {% endif %}
</div>
{% endblock %}
