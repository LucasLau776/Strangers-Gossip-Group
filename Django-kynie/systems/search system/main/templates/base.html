<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MMU Strangers Gossip{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="{% if request.COOKIES.dark_mode == 'dark' %}dark-mode{% endif %}">
  <!-- Top Navigation Bar -->
  <div class="top-nav">
    <div class="logo">
      <a href="{% url 'index' %}">MMU Strangers Gossip</a>
    </div>
    <div class="search-container">
      <form method="GET" action="{% url 'search' %}">
        <input type="text" name="q" placeholder="Search..." value="{{ request.GET.q }}">
      </form>
    </div>
    <div class="nav-links">
      <a href="{% url 'index' %}">Home</a>
      <a href="{% url 'trending' %}">Trending</a>
      <a href="{% url 'post' %}">Post</a>
      <a href="{% url 'login' %}">Login</a>
      <a href="{% url 'register' %}">Register</a>
    </div>
  </div>

  {% block content %}{% endblock %}

  <!-- Floating Buttons -->
  <button class="floating-btn" id="themeToggle" onclick="toggleDarkMode()">🌙</button>
  <button class="floating-btn" id="notifBtn" onclick="location.href='{% url 'notification' %}'">🔔</button>
  <button class="floating-btn" id="bookmarkBtn" onclick="location.href='{% url 'bookmark' %}'">📑</button>

  <!-- Footer -->
  <footer>
    <p>© 2025 MMU Strangers Gossip</p>
  </footer>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const currentMode = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
      document.cookie = "dark_mode=" + currentMode;
      document.getElementById('themeToggle').textContent = currentMode === 'dark' ? '☀️' : '🌙';
    }

    if (document.body.classList.contains('dark-mode')) {
      document.getElementById('themeToggle').textContent = '☀️';
    }
  </script>
</body>
</html>
