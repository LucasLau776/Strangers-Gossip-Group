<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MMU Strangers Gossip{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="{% if request.COOKIES.dark_mode %}dark-mode{% endif %}">
  <div class="navbar">
    <!-- Navbar content here -->
  </div>

  {% block content %}{% endblock %}

  <!-- Dark Mode Toggle Button -->
  <button id="themeToggle" class="btn btn-light" onclick="toggleDarkMode()">🌙</button>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const currentMode = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
      document.cookie = "dark_mode=" + currentMode;
      document.getElementById('themeToggle').textContent = currentMode === 'dark' ? '☀️' : '🌙';
    }

    if (document.body.classList.contains('dark-mode')) {
      document.getElementById('themeToggle').textContent = '☀️';
    }
  </script>
</body>
</html>
